<!DOCTYPE html><html><head><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><style>html,body{margin:0;padding:0;background:transparent}.band{position:fixed;left:0;right:0;bottom:0;padding:28px 16px 16px}.card{position:relative;background:linear-gradient(180deg,#eafff0,#d8f7e3);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:18px 16px;display:flex;align-items:center;gap:14px;font-family:-apple-system,Roboto,sans-serif}.avatar{width:56px;height:56px;border-radius:50%;background:#cfe9d6;flex:0 0 auto}.text{flex:1 1 auto;min-width:0}.title{font-size:20px;font-weight:700;color:#14351f}.subtitle{font-size:15px;color:#4a6b56;margin-top:2px}.stars{display:flex;gap:6px;flex:0 0 auto}.star{font-size:30px;color:#b9c6bd;cursor:pointer}.star.on{color:#f5a623}.close{position:absolute;top:-18px;right:10px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);border:none;font-size:20px;color:#555;cursor:pointer}</style></head><body><div class=band><div class=card><button class=close onclick="b._dismiss()">&times;</button><div class=avatar></div><div class=text><div class=title>Rate the driver</div><div class=subtitle>Cisauk Train Station</div></div><div class=stars id=stars><span class=star data-v=1>&#9733;</span><span class=star data-v=2>&#9733;</span><span class=star data-v=3>&#9733;</span><span class=star data-v=4>&#9733;</span><span class=star data-v=5>&#9733;</span></div></div></div><script>var b=window.CustomHtmlBridge||{_display:function(){},_click:function(){},_dismiss:function(){},_open:function(){},_track:function(){},_log:function(){}},s=document.querySelectorAll('#stars .star');s.forEach(function(e){e.addEventListener('click',function(){var v=+e.getAttribute('data-v');s.forEach(function(o){o.classList.toggle('on',+o.getAttribute('data-v')<=v)});b._log('rating tapped: '+v);setTimeout(function(){b._track('iam_rating',JSON.stringify({rating:String(v)}));b._click('rating')},180)})})</script></body></html>
